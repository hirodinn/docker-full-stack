version: '3.8'
services:
  mongodb:
    image: mongo
    env_file:
      - ./backend/mongo.env
    volumes:
      - data:/data/db
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/backend.env
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  data:
